<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>blingbling - 辅导员助手</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:#ededed;height:100vh;display:flex;justify-content:center;align-items:center}
.phone{border-radius: 10px;width:420px;max-width:100vw;height:92vh;max-height:800px;background:#f5f5f5;display:flex;flex-direction:column;box-shadow:0 4px 30px rgba(0,0,0,.15);overflow:hidden}

/* Header */
.header{background:linear-gradient(135deg,#3b7dd8,#5b9ef5);padding:12px 16px;display:flex;align-items:center;gap:12px;color:#fff;flex-shrink:0}
.header .back{font-size:20px;cursor:pointer;opacity:.9}
.avatar{width:42px;height:42px;border-radius:6px;object-fit:cover;flex-shrink:0;border:2px solid rgba(255,255,255,.4)}
.header .info{flex:1;min-width:0}
.header .name{font-size:16px;font-weight:600}
.header .status{font-size:11px;opacity:.8;margin-top:2px}
.header .actions{display:flex;gap:4px}
.header .actions button{background:rgba(255,255,255,.2);border:none;color:#fff;width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:background .2s}
.header .actions button:hover{background:rgba(255,255,255,.35)}

/* Banner */
.stern-banner{background:#e74c3c;color:#fff;text-align:center;padding:6px;font-size:12px;font-weight:600;display:none;animation:shake .4s}
.stern-banner.show{display:block}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}

/* Messages */
.messages{flex:1;overflow-y:auto;padding:16px 12px;display:flex;flex-direction:column;gap:12px;scroll-behavior:smooth}
.messages::-webkit-scrollbar{width:4px}
.messages::-webkit-scrollbar-thumb{background:#ccc;border-radius:4px}

.msg{display:flex;gap:8px;max-width:85%;animation:fadeIn .3s}
.msg.counselor{align-self:flex-start}
.msg.student{align-self:flex-end;flex-direction:row-reverse}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.msg .bubble-avatar{width:36px;height:36px;border-radius:6px;object-fit:cover;flex-shrink:0}
.msg.student .bubble-avatar{display:none}
.msg .bubble{position:relative;padding:10px 14px;border-radius:8px;font-size:14px;line-height:1.6;word-break:break-word;white-space:pre-wrap}
.msg.counselor .bubble{background:#fff;border-top-left-radius:2px;box-shadow:0 1px 2px rgba(0,0,0,.06)}
.msg.student .bubble{background:#95ec69;border-top-right-radius:2px}
.msg .bubble-name{font-size:11px;color:#999;margin-bottom:3px}
.msg.student .bubble-name{text-align:right}

/* Streaming */
.msg.streaming .bubble{cursor:default}

/* Typing indicator */
.typing-dots{display:flex;gap:4px;padding:6px 0}
.typing-dots span{width:7px;height:7px;border-radius:50%;background:#bbb;animation:dot 1.4s infinite}
.typing-dots span:nth-child(2){animation-delay:.2s}
.typing-dots span:nth-child(3){animation-delay:.4s}
@keyframes dot{0%,80%,100%{transform:scale(.6);opacity:.4}40%{transform:scale(1);opacity:1}}

/* Input */
.input-area{display:flex;align-items:center;gap:8px;padding:10px 12px;background:#f7f7f7;border-top:1px solid #e0e0e0;flex-shrink:0}
.input-area input{flex:1;border:none;outline:none;background:#fff;border-radius:20px;padding:10px 16px;font-size:14px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.input-area input:focus{box-shadow:0 1px 6px rgba(59,125,216,.15)}
.input-area button{width:38px;height:38px;border:none;border-radius:50%;background:#3b7dd8;color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s,transform .1s;flex-shrink:0}
.input-area button:hover{background:#2b6dc8}
.input-area button:active{transform:scale(.95)}
.input-area button:disabled{background:#ccc;cursor:not-allowed}
.input-area button#clearBtn{width:auto;height:32px;border-radius:16px;padding:0 12px;font-size:12px;background:#e0e0e0;color:#666}
.input-area button#clearBtn:hover{background:#d0d0d0}

/* Error */
.error-banner{background:#fff3cd;color:#856404;padding:8px 12px;font-size:12px;text-align:center;display:none}
.error-banner.show{display:block}

/* Responsive */
@media(max-width:440px){.phone{width:100%;height:100vh;max-height:100vh;border-radius:0}}
</style>
</head>
<body>

<div class="phone">
  <div class="header">
    <span class="back">←</span>
    <img class="avatar" src="/static/导员头像.jpg" alt="辅导员" id="counselorAvatar">
    <div class="info">
      <div class="name" id="counselorName">blingbling</div>
      <div class="status" id="statusText">连接中...</div>
    </div>
    <div class="actions">
      <button id="reloadBtn" title="重载聊天记录">🔄</button>
      <button id="headerClearBtn" title="清空对话">🗑</button>
    </div>
  </div>
  <div class="stern-banner" id="sternBanner">⚠ 严厉批评模式</div>
  <div class="error-banner" id="errorBanner"></div>
  <div class="messages" id="messages"></div>
  <div class="input-area">
    <input type="text" id="userInput" placeholder="输入消息..." autofocus>
    <button id="clearBtn" title="新对话">↺</button>
    <button id="sendBtn" title="发送">↑</button>
  </div>
</div>

<script>
let ws = null;
let counselorAvatar = "/static/导员头像.jpg";
let counselorName = "blingbling";
let studentAvatar = "";
let isStreaming = false;
let streamingEl = null;

const messagesEl = document.getElementById("messages");
const userInput = document.getElementById("userInput");
const sendBtn = document.getElementById("sendBtn");
const clearBtn = document.getElementById("clearBtn");
const headerClearBtn = document.getElementById("headerClearBtn");
const reloadBtn = document.getElementById("reloadBtn");
const statusText = document.getElementById("statusText");
const sternBanner = document.getElementById("sternBanner");
const errorBanner = document.getElementById("errorBanner");
const nameEl = document.getElementById("counselorName");
const avatarEl = document.getElementById("counselorAvatar");

function scrollBottom() {
  setTimeout(() => messagesEl.scrollTop = messagesEl.scrollHeight, 50);
}

function addMessage(role, content) {
  const div = document.createElement("div");
  div.className = `msg ${role}`;

  if (role === "counselor") {
    const av = document.createElement("img");
    av.className = "bubble-avatar";
    av.src = counselorAvatar;
    div.appendChild(av);
  }

  const bubble = document.createElement("div");
  bubble.className = "bubble";

  if (role === "counselor") {
    const nm = document.createElement("div");
    nm.className = "bubble-name";
    nm.textContent = counselorName;
    bubble.appendChild(nm);
  }

  const text = document.createElement("span");
  text.textContent = content;
  bubble.appendChild(text);
  div.appendChild(bubble);
  messagesEl.appendChild(div);
  scrollBottom();
  return div;
}

function startStreamingBubble() {
  const div = document.createElement("div");
  div.className = "msg counselor streaming";

  const av = document.createElement("img");
  av.className = "bubble-avatar";
  av.src = counselorAvatar;
  div.appendChild(av);

  const bubble = document.createElement("div");
  bubble.className = "bubble";

  const nm = document.createElement("div");
  nm.className = "bubble-name";
  nm.textContent = counselorName;
  bubble.appendChild(nm);

  const text = document.createElement("span");
  text.textContent = "";
  bubble.appendChild(text);

  const dots = document.createElement("div");
  dots.className = "typing-dots";
  dots.innerHTML = "<span></span><span></span><span></span>";
  bubble.appendChild(dots);

  div.appendChild(bubble);
  messagesEl.appendChild(div);
  scrollBottom();
  return { div, text, dots };
}

function finishStreaming(status) {
  isStreaming = false;
  if (streamingEl) {
    if (streamingEl.dots) streamingEl.dots.remove();
    streamingEl.div.classList.remove("streaming");
    streamingEl = null;
  }
  sendBtn.disabled = false;
  userInput.disabled = false;
  userInput.focus();
  statusText.textContent = status || "在线";
}

function setStatus(text) {
  statusText.textContent = text;
}

function showError(msg) {
  errorBanner.textContent = msg;
  errorBanner.classList.add("show");
  setTimeout(() => errorBanner.classList.remove("show"), 4000);
}

function connect() {
  const protocol = location.protocol === "https:" ? "wss:" : "ws:";
  ws = new WebSocket(`${protocol}//${location.host}/ws`);
  setStatus("连接中...");

  ws.onopen = () => {
    setStatus("在线");
  };

  ws.onmessage = (e) => {
    const data = JSON.parse(e.data);

    switch (data.type) {
      case "info":
        if (data.counselor_name) {
          counselorName = data.counselor_name;
          nameEl.textContent = counselorName;
        }
        if (data.counselor_avatar) {
          counselorAvatar = data.counselor_avatar;
          avatarEl.src = counselorAvatar;
        }
        setStatus("在线");
        break;

      case "status":
        if (data.content === "initiating") {
          setStatus("正在发起对话...");
          messagesEl.innerHTML = "";
        } else if (data.content === "clearing") {
          setStatus("正在清除对话...");
          messagesEl.innerHTML = "";
        }
        break;

      case "message":
        if (data.role === "counselor") {
          addMessage("counselor", data.content);
          setStatus("在线");
        } else if (data.role === "student") {
          addMessage("student", data.content);
        }
        break;

      case "chunk":
        if (!streamingEl) {
          const s = startStreamingBubble();
          streamingEl = s;
          isStreaming = true;
          sendBtn.disabled = true;
          userInput.disabled = true;
          setStatus("blingbling 正在输入...");
        }
        streamingEl.text.textContent += data.content;
        scrollBottom();
        break;

      case "stern_mode":
        sternBanner.classList.add("show");
        setTimeout(() => sternBanner.classList.remove("show"), 3000);
        break;

      case "done":
        finishStreaming("在线");
        break;

      case "error":
        showError(data.content);
        if (isStreaming) finishStreaming("出错了");
        break;
    }
  };

  ws.onclose = () => {
    setStatus("连接断开，刷新页面重连");
    userInput.disabled = true;
    sendBtn.disabled = true;
  };

  ws.onerror = () => {
    showError("连接失败，请确保服务已启动");
  };
}

function sendMessage() {
  const text = userInput.value.trim();
  if (!text || !ws || ws.readyState !== WebSocket.OPEN || isStreaming) return;
  userInput.value = "";
  ws.send(JSON.stringify({ action: "chat", content: text }));
}

function clearChat() {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  ws.send(JSON.stringify({ action: "clear" }));
}

function reloadExamples() {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  ws.send(JSON.stringify({ action: "reload" }));
}

sendBtn.addEventListener("click", sendMessage);
userInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter") sendMessage();
});
clearBtn.addEventListener("click", clearChat);
headerClearBtn.addEventListener("click", clearChat);
reloadBtn.addEventListener("click", reloadExamples);

connect();
</script>
</body>
</html>
